name: Build APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7
          cache-disabled: true

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK (per-run artifact)
        uses: actions/upload-artifact@v4
        with:
          name: esic-alert-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Remove previous "latest" release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish latest build as a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: Automatically built from commit ${{ github.sha }}. Always the newest working APK.
          files: app/build/outputs/apk/debug/app-debug.apk
